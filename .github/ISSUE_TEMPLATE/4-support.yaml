name: Support Request
description: Ask for help with installing, launching, or using the game
title: "[Support]: "
labels:
  - support

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reaching out. Please fill out the details below so we can better understand the problem and help you troubleshoot it.

  - type: input
    id: game_version
    attributes:
      label: Game version
      description: What version are you using?
      placeholder: "v1.0.0"
    validations:
      required: false

  - type: input
    id: system_os
    attributes:
      label: System OS
      description: What operating system is running on your system?
      placeholder: "Windows 11"
    validations:
      required: false

  - type: input
    id: system_cpu
    attributes:
      label: System CPU
      description: What processor does your system use?
      placeholder: "Intel i5-4440"
    validations:
      required: false

  - type: input
    id: system_gpu
    attributes:
      label: System GPU
      description: What graphics card does your system use?
      placeholder: "GTX 1050 Ti"
    validations:
      required: false

  - type: input
    id: system_ram
    attributes:
      label: System RAM
      description: How much memory does your system have?
      placeholder: "8 GB"
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: What do you need help with?
      description: Describe the problem you are having
      placeholder: "Describe the issue clearly and briefly"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried already?
      description: Tell us what you have already done to try to fix the problem
      placeholder: "List any troubleshooting steps you already tried"
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "Explain what you expected instead"
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add screenshots, error messages, or anything else that might help
      placeholder: "Drag and drop files here or paste links"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### Logs and world files

        You can find logs and world files in `%AppData%\voxel`.

        Logs are in `%AppData%\voxel\Logs`
        World files are in `%AppData%\voxel\Worlds`

        If your issue is related to a specific world, please put the relevant files into an archive first before uploading them here.

  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: Paste links or attach files if available
      placeholder: "Drag and drop files here or paste links"
    validations:
      required: false

  - type: textarea
    id: world_file
    attributes:
      label: World file or additional data
      description: Attach a world file or describe any relevant world state if possible
      placeholder: "Optional, but very helpful if the issue depends on a specific world"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched for existing support requests first
          required: true